cityrover.sim {

  # Number of rovers to simulate
  numRovers = 50

  # Simulation tick interval (ms)
  tickMillis = 1000

  # Total simulation duration (minutes)
  simulationDurationMinutes = 30

  graph {
    # Path to graph-engine output (replace with real path later)
    # Example: "file:///opt/cityrover/graph/edges.json"
    path = "file:///tmp/cityrover/graph/"
  }

  kafka {
    # Kafka broker inside Docker network
    bootstrapServers = "kafka-1:19092"

    # Raw telemetry topic
    topic = "rover-telemetry-raw"
  }
}
