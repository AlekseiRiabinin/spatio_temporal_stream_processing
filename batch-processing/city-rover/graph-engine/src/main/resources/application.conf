cityrover.graph-engine {

  # Primary data source: PostgreSQL
  postgres {
    host     = "localhost"
    port     = 5436
    database = "cre_db"
    user     = "cre_user"
    password = "cre_password"
  }

  # Backup data source: local PBF file
  inputPbf = "data/maps/gcc-states-260716.osm.pbf"

  # Output directory for graph serialization
  outputDir = "batch-processing/city-rover/graph-engine/output/"
}
