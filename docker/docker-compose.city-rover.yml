services:

  graph-engine:
    build:
      context: ../batch-processing/city-rover/graph-engine
      dockerfile: Dockerfile
    container_name: cityrover-graph-engine
    volumes:
      - graph-data:/opt/cityrover/graph-engine/output
    networks:
      - kafka-net
      - postgis-net
    environment:
      POSTGIS_HOST: postgis-real-deal
      POSTGIS_PORT: 5432
      POSTGIS_DB: cre_db
      POSTGIS_USER: cre_user
      POSTGIS_PASSWORD: cre_password

  rover-simulator:
    build:
      context: ../batch-processing/city-rover/rover-simulator
      dockerfile: Dockerfile
    container_name: cityrover-rover-simulator
    depends_on:
      - graph-engine
      - kafka-1
    volumes:
      - graph-data:/opt/cityrover/graph-engine/output
    networks:
      - kafka-net
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:19092

  kafka-1:
    image: apache/kafka:3.8.0
    container_name: kafka-1
    ports:
      - "19092:19092"
      - "19093:19093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:19093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:19092,CONTROLLER://0.0.0.0:19093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:19092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: d8ce1515-401e-44d4-a444-1b6dba479047
    networks:
      - kafka-net
    restart: always

volumes:
  graph-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/../graph-data

networks:
  kafka-net:
    driver: bridge
  postgis-net:
    driver: bridge
