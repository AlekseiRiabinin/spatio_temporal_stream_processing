networks:
  kafka-net:
    driver: bridge

volumes:
  postgis-cre-data:
  redis-cre-data:

services:

  # ============================================================
  # 1. KAFKA BROKER
  # ============================================================

  kafka-1:
    image: bitnami/kafka:3.8.0
    container_name: kafka-1
    ports:
      - "19092:19092"
      - "19093:19093"
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_KRAFT_CLUSTER_ID=d8ce1515-401e-44d4-a444-1b6dba479047
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_HEAP_OPTS=-Xmx2G -Xms2G
    volumes:
      - ./kafka/server-1.properties:/opt/bitnami/kafka/config/server.properties:ro
    networks: [kafka-net]
    restart: always


  # ============================================================
  # 2. ARTICLE-03 GEO PRODUCER
  # ============================================================

  geo_producer_spatial_methods:
    image: alexflames77/geo_producer_spatial_methods:latest
    container_name: geo_producer_spatial_methods

    depends_on:
      - kafka-1

    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka-1:19092"
      KAFKA_TOPIC: "spatial-events"

      # ---------------------------
      # Rate patterns
      # ---------------------------
      EVENT_RATE_PATTERN: ${EVENT_RATE_PATTERN:-constant}
      EVENT_RATE: ${EVENT_RATE:-50}
      BURST_RATE: ${BURST_RATE:-100}
      BURST_DURATION_MS: ${BURST_DURATION_MS:-10000}
      PAUSE_MS: ${PAUSE_MS:-5000}
      WAVE_MIN: ${WAVE_MIN:-5}
      WAVE_MAX: ${WAVE_MAX:-100}
      WAVE_PERIOD_MS: ${WAVE_PERIOD_MS:-10000}

      # ---------------------------
      # Geometry
      # ---------------------------
      GEOMETRY_PATTERN: ${GEOMETRY_PATTERN:-random}

      # ---------------------------
      # Timestamp behavior
      # ---------------------------
      TIMESTAMP_PATTERN: ${TIMESTAMP_PATTERN:-realtime}
      MAX_SKEW_MS: ${MAX_SKEW_MS:-2000}
      MAX_DELAY_MS: ${MAX_DELAY_MS:-5000}

      # ---------------------------
      # Motion model
      # ---------------------------
      MOTION_MODE: ${MOTION_MODE:-straight}

      # ---------------------------
      # Object count
      # ---------------------------
      KEYS: ${KEYS:-50}

    networks: [kafka-net]

    restart: "no"



  # ============================================================
  # 3. FLINK JOBMANAGER
  # ============================================================

  jobmanager:
    image: flink:1.17.1
    container_name: jobmanager
    hostname: jobmanager
    ports:
      - "8081:8081"
      - "9249:9249"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        jobmanager.memory.process.size: 1600m
        taskmanager.memory.process.size: 1728m
        taskmanager.numberOfTaskSlots: 1
        rest.port: 8081
        rest.address: jobmanager
        metrics.reporters: prom
        metrics.reporter.prom.class: org.apache.flink.metrics.prometheus.PrometheusReporter
        metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
        metrics.reporter.prom.port: 9249
    command: jobmanager
    volumes:
      - ../stream-processing/flink-jobs/article-03-spatial-methods/target/scala-2.12/article-03-spatial-methods.jar:/opt/flink/usrlib/article-03-spatial-methods.jar
      - ./flink/flink-connector-kafka-3.0.0-1.17.jar:/opt/flink/lib/flink-connector-kafka-3.0.0-1.17.jar
      - ./flink/flink-metrics-prometheus-1.17.1.jar:/opt/flink/lib/flink-metrics-prometheus-1.17.1.jar
      - ./flink/kafka-clients-3.7.0.jar:/opt/flink/lib/kafka-clients-3.7.0.jar
    networks: [kafka-net]

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081"]
      interval: 5s
      timeout: 3s
      retries: 20


  # ============================================================
  # 4. FLINK TASKMANAGER
  # ============================================================

  taskmanager:
    image: flink:1.17.1
    container_name: taskmanager
    hostname: taskmanager
    depends_on: [jobmanager]
    ports:
      - "9250:9249"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.memory.process.size: 1728m
        taskmanager.numberOfTaskSlots: 1
        metrics.reporters: prom
        metrics.reporter.prom.class: org.apache.flink.metrics.prometheus.PrometheusReporter
        metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
        metrics.reporter.prom.port: 9249
    command: taskmanager
    volumes:
      - ./flink/flink-connector-kafka-3.0.0-1.17.jar:/opt/flink/lib/flink-connector-kafka-3.0.0-1.17.jar
      - ./flink/flink-metrics-prometheus-1.17.1.jar:/opt/flink/lib/flink-metrics-prometheus-1.17.1.jar
      - ./flink/kafka-clients-3.7.0.jar:/opt/flink/lib/kafka-clients-3.7.0.jar
    networks: [kafka-net]


  # ============================================================
  # 5. FLINK JOB SUBMISSION (Article 03)
  # ============================================================

  geoflink_spatial_methods_job:
    image: flink:1.17.1
    container_name: geoflink_spatial_methods_job
    depends_on:
      jobmanager:
        condition: service_healthy
      kafka-1:
        condition: service_started
    command: >
      flink run
      -c phd.spatialmethods.Article03SpatialMethodsJob
      -m jobmanager:8081
      /opt/flink/usrlib/article-03-spatial-methods.jar
    volumes:
      - ../stream-processing/flink-jobs/article-03-spatial-methods/target/scala-2.12/article-03-spatial-methods.jar:/opt/flink/usrlib/article-03-spatial-methods.jar:ro
      - ./flink/flink-connector-kafka-3.0.0-1.17.jar:/opt/flink/lib/flink-connector-kafka-3.0.0-1.17.jar:ro
      - ./flink/kafka-clients-3.7.0.jar:/opt/flink/lib/kafka-clients-3.7.0.jar
    networks: [kafka-net]
    restart: "no"


  # ============================================================
  # 6. MONITORING & KAFKA UI
  # ============================================================

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks: [kafka-net]
    restart: always

  kafdrop:
    image: obsidiandynamics/kafdrop:3.30.0
    container_name: kafdrop
    ports:
      - "9003:9000"
    environment:
      KAFKA_BROKERCONNECT: "kafka-1:19092"
    depends_on:
      - kafka-1
    networks: [kafka-net]
    restart: always
