networks:
  kafka-net:
    driver: bridge

volumes:
  prometheus-data:

services:

  # ============================================================
  # 1. KAFKA BROKER
  # ============================================================
  kafka-1:
    image: bitnami/kafka:3.8.0
    container_name: kafka-1
    ports:
      - "19092:19092"
      - "19093:19093"
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_KRAFT_CLUSTER_ID=d8ce1515-401e-44d4-a444-1b6dba479047
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_HEAP_OPTS=-Xmx2G -Xms2G
    networks: [kafka-net]
    restart: always


  # ============================================================
  # 2. ARTICLE-04 GEO PRODUCER
  # ============================================================
  geo_producer_adaptive_control:
    image: alexflames77/geo_producer_adaptive_control:latest
    container_name: geo_producer_adaptive_control

    depends_on:
      - kafka-1

    environment:
      # ========================================================
      # Kafka
      # ========================================================
      KAFKA_BOOTSTRAP_SERVERS: "kafka-1:19092"
      KAFKA_TOPIC: "spatial-events"

      # ========================================================
      # Rate Control
      # ========================================================
      EVENT_RATE_PATTERN: ${EVENT_RATE_PATTERN:-constant}

      EVENT_RATE: ${EVENT_RATE:-50}

      BURST_RATE: ${BURST_RATE:-100}
      BURST_DURATION_MS: ${BURST_DURATION_MS:-10000}
      PAUSE_MS: ${PAUSE_MS:-5000}

      WAVE_MIN: ${WAVE_MIN:-5}
      WAVE_MAX: ${WAVE_MAX:-100}
      WAVE_PERIOD_MS: ${WAVE_PERIOD_MS:-10000}

      # ========================================================
      # Geometry / Spatial Distribution
      # ========================================================
      GEOMETRY_PATTERN: ${GEOMETRY_PATTERN:-clustered}

      # ========================================================
      # Motion Model
      # ========================================================
      MOTION_MODE: ${MOTION_MODE:-swarm}

      # ========================================================
      # Stream Scale
      # ========================================================
      KEYS: ${KEYS:-100}

      # ========================================================
      # Base Timestamp Pattern
      # ========================================================
      TIMESTAMP_PATTERN: ${TIMESTAMP_PATTERN:-realtime}

      MAX_SKEW_MS: ${MAX_SKEW_MS:-2000}
      MAX_DELAY_MS: ${MAX_DELAY_MS:-5000}

      DISORDER_PROBABILITY: ${DISORDER_PROBABILITY:-0.20}
      MAX_DISORDER_MS: ${MAX_DISORDER_MS:-3000}

      # ========================================================
      # Additional Timestamp Skew Injection
      # ========================================================
      ENABLE_TIMESTAMP_SKEW: ${ENABLE_TIMESTAMP_SKEW:-false}

      TIMESTAMP_SKEW_MODE: ${TIMESTAMP_SKEW_MODE:-bidirectional}
      SKEW_PROBABILITY: ${SKEW_PROBABILITY:-0.20}

      # ========================================================
      # Composite Disorder Pipeline
      # ========================================================
      ENABLE_DISORDER: ${ENABLE_DISORDER:-false}

      ENABLE_JITTER: ${ENABLE_JITTER:-false}
      MAX_JITTER_MS: ${MAX_JITTER_MS:-500}

      ENABLE_BURST_DELAY: ${ENABLE_BURST_DELAY:-false}
      BURST_DELAY_PROBABILITY: ${BURST_DELAY_PROBABILITY:-0.05}
      BURST_DELAY_MS: ${BURST_DELAY_MS:-10000}

      ENABLE_GPS_DROPOUT: ${ENABLE_GPS_DROPOUT:-false}
      GPS_DROPOUT_PROBABILITY: ${GPS_DROPOUT_PROBABILITY:-0.00}

      # ========================================================
      # Article 04 Adaptive Layer
      # ========================================================
      WINDOW_STRATEGY: ${WINDOW_STRATEGY:-fixed}
      WINDOW_SIZE_MS: ${WINDOW_SIZE_MS:-5000}

      WATERMARK_STRATEGY: ${WATERMARK_STRATEGY:-fixed}
      WATERMARK_DELAY_MS: ${WATERMARK_DELAY_MS:-3000}

      ML_INFERENCE: ${ML_INFERENCE:-disabled}
      MODEL_UPDATE_INTERVAL: ${MODEL_UPDATE_INTERVAL:-5000}

      ADAPTATION_INTERVAL_MS: ${ADAPTATION_INTERVAL_MS:-2000}

    networks: [kafka-net]

    restart: "no"


  # ============================================================
  # 3. FLINK JOBMANAGER
  # ============================================================
  jobmanager:
    image: flink:1.17.1
    container_name: jobmanager
    ports:
      - "8081:8081"
      - "9249:9249"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        jobmanager.memory.process.size: 1600m
        taskmanager.memory.process.size: 1728m
        taskmanager.numberOfTaskSlots: 2
        rest.port: 8081
        metrics.reporters: prom
        metrics.reporter.prom.class: org.apache.flink.metrics.prometheus.PrometheusReporter
        metrics.reporter.prom.port: 9249
    command: jobmanager
    networks: [kafka-net]
    restart: always


  # ============================================================
  # 4. FLINK TASKMANAGER
  # ============================================================
  taskmanager:
    image: flink:1.17.1
    container_name: taskmanager
    depends_on: [jobmanager]
    ports:
      - "9250:9249"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.memory.process.size: 1728m
        taskmanager.numberOfTaskSlots: 2
        metrics.reporters: prom
        metrics.reporter.prom.class: org.apache.flink.metrics.prometheus.PrometheusReporter
        metrics.reporter.prom.port: 9249
    command: taskmanager
    networks: [kafka-net]
    restart: always


  # ============================================================
  # 5. FLINK JOB (ARTICLE 04 - ADAPTIVE CONTROL)
  # ============================================================
  geoflink_adaptive_control_job:
    image: flink:1.17.1
    container_name: geoflink_adaptive_control_job
    depends_on:
      jobmanager:
        condition: service_started
      kafka-1:
        condition: service_started
    command: >
      flink run
      -c phd.adaptivecontrol.Article04AdaptiveControlJob
      -m jobmanager:8081
      /opt/flink/usrlib/article-04-adaptive-control.jar
    volumes:
      - ../stream-processing/flink-jobs/article-04-adaptive-control/target/scala-2.12/article-04-adaptive-control.jar:/opt/flink/usrlib/article-04-adaptive-control.jar:ro
    networks: [kafka-net]
    restart: "no"


  # ============================================================
  # 6. MONITORING
  # ============================================================
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9091:9090"
    networks: [kafka-net]
    restart: always


  kafdrop:
    image: obsidiandynamics/kafdrop:3.30.0
    container_name: kafdrop
    ports:
      - "9003:9000"
    environment:
      KAFKA_BROKERCONNECT: "kafka-1:19092"
    depends_on:
      - kafka-1
    networks: [kafka-net]
    restart: always
